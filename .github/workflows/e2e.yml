name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # ── Build & start the Rust API ────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Build API
        run: cargo build --manifest-path backend/Cargo.toml --bin omni-api

      - name: Start API in background
        run: ./backend/target/debug/omni-api &
        env:
          RUST_LOG: info
          MONGODB_URL: mongodb://localhost:27017
          MONGODB_DATABASE: omni_e2e
          REDIS_URL: redis://localhost:6379

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then
              echo " API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "API failed to start"
          exit 1

      # ── Build frontend & serve ────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium firefox

      - name: Start preview server
        working-directory: frontend
        run: npx vite preview --port 4173 &

      - name: Wait for preview server
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:4173 > /dev/null 2>&1; then
              echo "Preview server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Preview server failed to start"
          exit 1

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: true
          BASE_URL: http://localhost:4173
          API_URL: http://localhost:8080

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
