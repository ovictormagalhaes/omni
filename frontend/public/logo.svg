<svg width="200" height="64" viewBox="0 0 200 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon Section -->
  <g id="icon">
    <!-- Outer circle -->
    <circle cx="32" cy="32" r="28" stroke="url(#logoGradient)" stroke-width="2" fill="none" opacity="0.3"/>
    
    <!-- Middle circle -->
    <circle cx="32" cy="32" r="20" stroke="url(#logoGradient)" stroke-width="2.5" fill="none" opacity="0.6"/>
    
    <!-- Inner circle -->
    <circle cx="32" cy="32" r="12" fill="url(#logoGradient)"/>
    
    <!-- Central dot -->
    <circle cx="32" cy="32" r="3" fill="white"/>
    
    <!-- Connection lines -->
    <line x1="32" y1="20" x2="32" y2="12" stroke="url(#logoGradient2)" stroke-width="2" opacity="0.4"/>
    <line x1="32" y1="44" x2="32" y2="52" stroke="url(#logoGradient2)" stroke-width="2" opacity="0.4"/>
    <line x1="20" y1="32" x2="12" y2="32" stroke="url(#logoGradient2)" stroke-width="2" opacity="0.4"/>
    <line x1="44" y1="32" x2="52" y2="32" stroke="url(#logoGradient2)" stroke-width="2" opacity="0.4"/>
  </g>
  
  <!-- Text Section -->
  <g id="text" transform="translate(75, 0)">
    <!-- OMNI text -->
    <text x="0" y="42" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#logoGradient)">
      OMNI
    </text>
    
    <!-- Subtitle -->
    <text x="2" y="54" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="400" fill="#6B7280" letter-spacing="1">
      YIELD AGGREGATOR
    </text>
  </g>
</svg>
