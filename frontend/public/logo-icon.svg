<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="omniGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="omniGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="32" cy="32" r="30" stroke="url(#omniGradient)" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- Middle circle -->
  <circle cx="32" cy="32" r="22" stroke="url(#omniGradient)" stroke-width="2.5" fill="none" opacity="0.6"/>
  
  <!-- Inner circle with pulse effect -->
  <circle cx="32" cy="32" r="14" fill="url(#omniGradient)">
    <animate attributeName="r" values="14;15;14" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Central dot -->
  <circle cx="32" cy="32" r="4" fill="white"/>
  
  <!-- Connection lines (representing aggregation) -->
  <line x1="32" y1="18" x2="32" y2="10" stroke="url(#omniGradient2)" stroke-width="2" opacity="0.4"/>
  <line x1="32" y1="46" x2="32" y2="54" stroke="url(#omniGradient2)" stroke-width="2" opacity="0.4"/>
  <line x1="18" y1="32" x2="10" y2="32" stroke="url(#omniGradient2)" stroke-width="2" opacity="0.4"/>
  <line x1="46" y1="32" x2="54" y2="32" stroke="url(#omniGradient2)" stroke-width="2" opacity="0.4"/>
  
  <!-- Diagonal lines -->
  <line x1="22" y1="22" x2="15" y2="15" stroke="url(#omniGradient2)" stroke-width="1.5" opacity="0.3"/>
  <line x1="42" y1="22" x2="49" y2="15" stroke="url(#omniGradient2)" stroke-width="1.5" opacity="0.3"/>
  <line x1="22" y1="42" x2="15" y2="49" stroke="url(#omniGradient2)" stroke-width="1.5" opacity="0.3"/>
  <line x1="42" y1="42" x2="49" y2="49" stroke="url(#omniGradient2)" stroke-width="1.5" opacity="0.3"/>
</svg>
